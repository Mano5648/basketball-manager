<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dublin Lions Basketball Club</title>
    <script>
      // GitHub Pages / static hosting: deep links like /basketball-manager/player/login
      // must redirect to the hash-router entry (/#/player/login).
      (function () {
        var base = '/basketball-manager/'
        var path = window.location.pathname
        if (!path.startsWith(base)) {
          window.location.replace(base)
          return
        }
        var rest = path.slice(base.length).replace(/^\//, '')
        var search = window.location.search || ''
        var hash = window.location.hash || ''
        if (rest && !hash) {
          window.location.replace(base + '#/' + rest + search)
        } else {
          window.location.replace(base)
        }
      })()
    </script>
  </head>
  <body></body>
</html>
